<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FDF7EE">
<title>半券 — あなたを観に来てくれる人の台帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FDF7EE;
  --card:#FFFFFF;
  --kaki:#E8785A;
  --kaki-deep:#D5603F;
  --kaki-soft:#FBE9E2;
  --midori:#5FA487;
  --midori-soft:#E5F2EC;
  --sora:#6D9BC3;
  --sora-soft:#E8F0F7;
  --kincha:#D9A441;
  --kincha-soft:#F8EDD5;
  --gray:#B4A99B;
  --gray-soft:#F3EEE6;
  --ink:#4A4238;
  --sub:#9A8F82;
  --line:#EFE5D8;
  --radius:18px;
  --maru:'Zen Maru Gothic',sans-serif;
  --kiwi:'Kiwi Maru',serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--maru);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.65}
button{font-family:var(--maru);cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:var(--maru);font-size:16px;width:100%;padding:11px 14px;border:2px solid var(--line);border-radius:14px;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--kaki)}
label{display:block;font-size:12.5px;font-weight:700;color:var(--sub);margin:14px 0 5px;letter-spacing:.03em}

header{background:var(--bg);padding:calc(16px + env(safe-area-inset-top)) 20px 6px;text-align:center}
header h1{font-family:var(--kiwi);font-weight:500;font-size:24px;letter-spacing:.2em;color:var(--kaki-deep)}
header h1 .tkt{display:inline-block;transform:rotate(-8deg);margin-right:6px}
header .tagline{font-size:11px;color:var(--sub);letter-spacing:.06em}

nav{display:flex;gap:6px;padding:10px 14px;position:sticky;top:0;z-index:50;background:var(--bg)}
nav button{flex:1;padding:9px 0;font-size:12.5px;font-weight:700;color:var(--sub);border-radius:14px;background:#fff;border:2px solid var(--line)}
nav button .ic{display:block;font-size:17px;line-height:1.2}
nav button.on{color:#fff;background:var(--kaki);border-color:var(--kaki)}

main{padding:12px 16px calc(96px + env(safe-area-inset-bottom));max-width:640px;margin:0 auto}
.view{display:none}
.view.on{display:block}

.card{background:var(--card);border:2px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.section-title{font-family:var(--kiwi);font-size:15px;color:var(--kaki-deep);margin:20px 0 10px;display:flex;align-items:center;gap:7px}
.section-title::after{content:"";flex:1;height:2px;background:var(--line);border-radius:2px}
.empty{text-align:center;color:var(--sub);padding:30px 16px 34px;font-size:13.5px}
.empty .big{font-family:var(--kiwi);font-size:16px;color:var(--ink);display:block;margin-bottom:6px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 18px;border-radius:16px;font-weight:700;font-size:14.5px}
.btn-primary{background:var(--kaki);color:#fff;width:100%;box-shadow:0 3px 0 var(--kaki-deep)}
.btn-primary:active{transform:translateY(2px);box-shadow:0 1px 0 var(--kaki-deep)}
.btn-ghost{border:2px solid var(--line);color:var(--ink);background:#fff}
.btn-danger{color:var(--kaki-deep);font-size:13px;padding:8px}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:12px}
.fab{position:fixed;right:18px;bottom:calc(22px + env(safe-area-inset-bottom));height:52px;padding:0 20px 0 18px;border-radius:26px;background:var(--kaki);color:#fff;font-size:14px;font-weight:700;box-shadow:0 4px 0 var(--kaki-deep),0 6px 16px rgba(213,96,63,.3);z-index:40;line-height:1;display:flex;align-items:center;gap:6px;white-space:nowrap}
.fab .plus{font-size:20px;line-height:1}
.fab:active{transform:translateY(3px);box-shadow:0 1px 0 var(--kaki-deep)}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(96px + env(safe-area-inset-bottom));background:var(--ink);color:#fff;font-size:13.5px;font-weight:700;padding:10px 22px;border-radius:24px;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
.toast.on{opacity:1}

.show-card{width:100%;text-align:left;background:var(--card);border:2px solid var(--line);border-radius:var(--radius);padding:15px 16px;margin-bottom:12px;position:relative}
.show-card .emoji{position:absolute;right:14px;top:13px;font-size:20px}
.show-card h3{font-family:var(--kiwi);font-size:16.5px;padding-right:34px}
.show-card .date{font-size:12px;color:var(--sub);margin-top:2px}
.gauge-wrap{margin-top:10px}
.gauge-label{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:4px}
.gauge-label b{color:var(--kaki-deep);font-size:13px}
.gauge{height:12px;background:var(--bg);border-radius:8px;overflow:hidden;border:2px solid var(--line)}
.gauge > i{display:block;height:100%;background:linear-gradient(90deg,var(--kaki),#F09B77);border-radius:6px;transition:width .5s ease}
.gauge > i.full{background:linear-gradient(90deg,var(--kincha),#EBC670)}
.show-stats{display:flex;gap:14px;margin-top:9px;font-size:12px;color:var(--sub);flex-wrap:wrap}
.show-stats b{color:var(--ink);font-size:13.5px}

.info-box{background:#FFFDF8;border:2px solid var(--kincha-soft);border-radius:16px;padding:12px 14px;margin-bottom:12px}
.info-box .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.info-box .head b{font-size:13px;color:#B5872F}
.info-box pre{font-family:var(--maru);font-size:13px;white-space:pre-wrap;word-break:break-all;color:var(--ink)}
.copy-btn{background:var(--kincha);color:#fff;font-size:12px;font-weight:700;padding:7px 14px;border-radius:12px;box-shadow:0 2px 0 #B5872F;flex-shrink:0}
.copy-btn:active{transform:translateY(2px);box-shadow:none}

.stage-scroller{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 10px;-webkit-overflow-scrolling:touch}
.stage-chip{flex-shrink:0;padding:8px 15px;border-radius:20px;border:2px solid var(--line);background:#fff;font-size:13px;font-weight:700;color:var(--sub);white-space:nowrap}
.stage-chip.on{background:var(--kaki);border-color:var(--kaki);color:#fff}
.stage-chip.add{border-style:dashed;color:var(--kaki-deep)}

.roll-row{display:flex;align-items:center;gap:10px;background:var(--card);border:2px solid var(--line);border-radius:16px;padding:9px 11px;margin-bottom:8px}
.roll-row .check{width:34px;height:34px;border-radius:50%;border:2.5px dashed var(--line);flex-shrink:0;font-size:17px;color:#D8CFC2;display:flex;align-items:center;justify-content:center;background:#FCFAF6}
.roll-row.in{border-color:var(--midori);background:var(--midori-soft)}
.roll-row.in .check{border:2.5px solid var(--midori);background:var(--midori);color:#fff}
.roll-row.cn{opacity:.55}
.roll-row .nm{flex:1;font-weight:700;font-size:14.5px;min-width:0;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.roll-row .nm small{display:block;font-weight:400;font-size:11px;color:var(--sub)}
.roll-badge{flex-shrink:0;font-size:11.5px;font-weight:700;padding:7px 10px;border-radius:14px;border:2px solid var(--line);background:#fff;color:var(--sub);max-width:46%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bd-gray{border-color:var(--gray);color:#8A7F70;background:var(--gray-soft)}
.bd-sora{border-color:var(--sora);color:#4A7AA6;background:var(--sora-soft)}
.bd-midori{border-color:var(--midori);color:#3F8A6C;background:#fff}
.bd-kincha{border-color:var(--kincha);color:#B5872F;background:var(--kincha-soft)}
.bd-red{border-color:#D98A8A;color:#B65A5A;background:#FAECEC}

.person{display:flex;align-items:center;gap:12px;background:var(--card);border:2px solid var(--line);border-radius:16px;padding:12px 14px;margin-bottom:9px;width:100%;text-align:left}
.person .avatar{width:44px;height:44px;border-radius:50%;background:var(--kincha-soft);color:var(--kaki-deep);display:flex;align-items:center;justify-content:center;font-family:var(--kiwi);font-size:18px;flex-shrink:0;border:2px solid var(--kincha)}
.person .info{flex:1;min-width:0}
.person .nm{font-weight:700;font-size:15px}
.person .sb{font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.person .cnt{font-size:11.5px;color:var(--kaki-deep);font-weight:700;flex-shrink:0;text-align:right}
.searchbar{margin-bottom:12px;position:relative}
.searchbar::before{content:"🔍";position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px}
.searchbar input{padding-left:38px;border-radius:20px}

.detail-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.back{font-size:14px;font-weight:700;color:var(--kaki-deep);padding:6px 8px 6px 0;flex-shrink:0}
.detail-head h2{font-family:var(--kiwi);font-size:18px;flex:1;min-width:0}
.kv{display:flex;padding:9px 0;border-bottom:1.5px dashed var(--line);font-size:14px;gap:12px}
.kv:last-child{border-bottom:none}
.kv .k{width:84px;flex-shrink:0;color:var(--sub);font-size:12.5px;font-weight:700;padding-top:1px}
.kv .v{flex:1;word-break:break-all}
.memo-item{border:2px solid var(--kincha-soft);border-left:5px solid var(--kincha);padding:9px 12px;margin-bottom:9px;background:#FFFDF8;border-radius:12px}
.memo-item .d{font-size:11px;color:var(--sub);font-weight:700}
.memo-item p{font-size:14px;white-space:pre-wrap}
.history-item{display:flex;justify-content:space-between;gap:8px;padding:9px 2px;border-bottom:1.5px dashed var(--line);font-size:13.5px}
.history-item:last-child{border-bottom:none}
.history-item .hd{color:var(--sub);font-size:11.5px}

.sum-hero{background:var(--kaki);color:#fff;border-radius:var(--radius);padding:20px 18px;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:0 3px 0 var(--kaki-deep)}
.sum-hero .deco{position:absolute;right:12px;bottom:8px;font-size:44px;opacity:.25;transform:rotate(-10deg)}
.sum-hero .t{font-size:12px;letter-spacing:.08em;opacity:.9}
.sum-hero .n{font-family:var(--kiwi);font-size:32px;margin-top:2px}
.sum-row{display:flex;gap:10px;margin-bottom:14px}
.sum-box{flex:1;background:var(--card);border:2px solid var(--line);border-radius:16px;padding:12px 6px;text-align:center}
.sum-box .ic{font-size:19px}
.sum-box .t{font-size:10.5px;color:var(--sub);font-weight:700}
.sum-box .n{font-family:var(--kiwi);font-size:19px;color:var(--kaki-deep)}

.modal-bg{position:fixed;inset:0;background:rgba(74,66,56,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-width:640px;max-height:88vh;overflow-y:auto;padding:10px 20px calc(24px + env(safe-area-inset-bottom));animation:up .22s ease}
.modal .handle{width:44px;height:5px;border-radius:3px;background:var(--line);margin:4px auto 14px}
@keyframes up{from{transform:translateY(40px);opacity:.5}to{transform:none;opacity:1}}
.modal h3{font-family:var(--kiwi);font-size:17px;color:var(--kaki-deep);margin-bottom:2px}
.modal .sub{font-size:12.5px;color:var(--sub)}
.modal .actions{display:flex;gap:10px;margin-top:20px}
.modal .actions .btn{flex:1}
.seg{display:flex;border:2px solid var(--line);border-radius:14px;overflow:hidden;margin-top:5px;background:#fff}
.seg button{flex:1;padding:10px 0;font-size:13px;font-weight:700;color:var(--sub)}
.seg button.on{background:var(--kaki);color:#fff}
.row2{display:flex;gap:10px}
.row2>div{flex:1}
.note{font-size:12px;color:var(--sub);margin-top:8px;line-height:1.6}

.st-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.st-grid button{padding:9px 14px;border-radius:14px;border:2px solid var(--line);background:#fff;font-size:13px;font-weight:700;color:var(--sub)}
.st-grid button.on{border-color:var(--kaki);background:var(--kaki-soft);color:var(--kaki-deep)}
.st-phase{font-size:11.5px;font-weight:700;color:var(--sub);margin:12px 0 2px}

.gp-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px;vertical-align:2px}
.gp-a{background:var(--kaki-soft);color:var(--kaki-deep);border:1.5px solid var(--kaki)}
.gp-b{background:var(--midori-soft);color:#3F8A6C;border:1.5px solid var(--midori)}
.gp-c{background:var(--sora-soft);color:#4A7AA6;border:1.5px solid var(--sora)}
.gp-pick{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.gp-pick button{display:flex;align-items:center;gap:10px;text-align:left;padding:10px 13px;border-radius:14px;border:2px solid var(--line);background:#fff}
.gp-pick button.on{border-color:var(--kaki);background:var(--kaki-soft)}
.gp-pick .ttl{font-size:13.5px;font-weight:700}
.gp-pick .ds{font-size:11px;color:var(--sub)}

.suggest-box{background:var(--sora-soft);border:2px solid var(--sora);border-radius:16px;padding:12px 14px;margin-bottom:12px}
.suggest-box .head{font-size:13px;font-weight:700;color:#4A7AA6;margin-bottom:6px}
.suggest-box .who{display:flex;flex-wrap:wrap;gap:7px}
.suggest-box .who button{background:#fff;border:2px solid var(--sora);border-radius:14px;padding:6px 12px;font-size:12.5px;font-weight:700;color:#4A7AA6}
.suggest-box .why{font-size:11px;color:var(--sub);margin-top:6px}

.guide-step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.guide-step .no{width:30px;height:30px;border-radius:50%;background:var(--kaki);color:#fff;font-family:var(--kiwi);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.guide-step p{font-size:13.5px;line-height:1.7}
.guide-step b{color:var(--kaki-deep)}
.a2hs-steps{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.a2hs-steps li{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;line-height:1.6;list-style:none}
.a2hs-steps .n{width:24px;height:24px;border-radius:50%;background:var(--kaki-soft);color:var(--kaki-deep);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<header>
  <h1><span class="tkt">🎫</span>半券</h1>
  <div class="tagline">あなたを観に来てくれる人の、たいせつな台帳</div>
</header>

<nav>
  <button class="on" data-tab="shows" onclick="tab('shows')"><span class="ic">🎭</span>公演</button>
  <button data-tab="people" onclick="tab('people')"><span class="ic">👥</span>顧客</button>
  <button data-tab="summary" onclick="tab('summary')"><span class="ic">📊</span>集計</button>
  <button data-tab="settings" onclick="tab('settings')"><span class="ic">⚙️</span>設定</button>
</nav>

<main>
  <div class="view on" id="view-shows"></div>
  <div class="view" id="view-show-detail"></div>
  <div class="view" id="view-people"></div>
  <div class="view" id="view-person-detail"></div>
  <div class="view" id="view-summary"></div>
  <div class="view" id="view-settings"></div>
</main>

<button class="fab" id="fab" onclick="fabAction()"><span class="plus">＋</span><span id="fabLabel">公演を登録</span></button>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBody"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ================= マスコット ================= */
const MASCOT=`<svg width="86" height="70" viewBox="0 0 86 70" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="margin-bottom:10px">
  <g transform="rotate(-6 43 35)">
    <path d="M8 16 h70 v10 a7 7 0 0 0 0 14 v10 h-70 v-10 a7 7 0 0 0 0-14 z" fill="#FBE9E2" stroke="#E8785A" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="56" y1="18" x2="56" y2="52" stroke="#E8785A" stroke-width="2" stroke-dasharray="3 4"/>
    <circle cx="27" cy="31" r="2.6" fill="#4A4238"/>
    <circle cx="43" cy="31" r="2.6" fill="#4A4238"/>
    <path d="M30 39 q5 5 10 0" stroke="#4A4238" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <circle cx="22" cy="38" r="2.5" fill="#F4B9A4" opacity=".8"/>
    <circle cx="48" cy="38" r="2.5" fill="#F4B9A4" opacity=".8"/>
    <text x="66" y="40" font-size="11" text-anchor="middle" fill="#E8785A" font-weight="bold">★</text>
  </g>
</svg>`;

/* ================= グループ(親密度)定義 ================= */
const GRP={
  A:{label:'いつも応援',icon:'🔥',desc:'普段から仲がよく、積極的に応援してくれる方',cls:'gp-a'},
  B:{label:'顔なじみ',icon:'🌱',desc:'連絡が取りやすい方',cls:'gp-b'},
  C:{label:'これから',icon:'☁️',desc:'まだ面識が浅い、これから仲良くなる方',cls:'gp-c'}
};

/* ================= ステータス定義 ================= */
const ST={
  annai_mae:{label:'案内前',cls:'bd-gray',phase:'pre',reserved:false},
  annai_zumi:{label:'案内済み',cls:'bd-sora',phase:'pre',reserved:false},
  remind_zumi:{label:'リマインド済み',cls:'bd-sora',phase:'pre',reserved:false},
  yoyaku_zumi:{label:'予約済み',cls:'bd-midori',phase:'pre',reserved:true},
  zenjitsu_zumi:{label:'前日案内済み',cls:'bd-midori',phase:'pre',reserved:true},
  cancel:{label:'キャンセル',cls:'bd-red',phase:'both',reserved:false},
  orei_mae:{label:'お礼の挨拶前',cls:'bd-kincha',phase:'post',reserved:true},
  orei_zumi:{label:'お礼送信済み',cls:'bd-midori',phase:'post',reserved:true}
};
const PRE_KEYS=['annai_mae','annai_zumi','remind_zumi','yoyaku_zumi','zenjitsu_zumi','cancel'];
const POST_KEYS=['orei_mae','orei_zumi','cancel'];
const isReserved=r=>ST[r.status]?ST[r.status].reserved:false;

/* ================= データ層 ================= */
const KEY='hanken_v3';
let memStore=null;
function migrate(d){
  (d.shows||[]).forEach(s=>{
    if(!s.stages||!s.stages.length){
      s.stages=[{id:'st_'+s.id,date:s.date||'',label:''}];
    }
  });
  (d.resv||[]).forEach(r=>{
    if(!r.stageId){
      const s=(d.shows||[]).find(x=>x.id===r.showId);
      if(s&&s.stages&&s.stages[0])r.stageId=s.stages[0].id;
    }
    /* 旧ステータス変換 */
    if(r.status==='yoyaku'||r.status==='torioki')r.status='yoyaku_zumi';
    if(r.status==='raijo')r.status='orei_mae';
    if(!ST[r.status])r.status='yoyaku_zumi';
  });
  (d.people||[]).forEach(p=>{
    /* 連絡先+SNS → 連絡方法へ統合 */
    if(p.sns!==undefined){
      p.contact=[p.contact,p.sns].filter(Boolean).join(' / ');
      delete p.sns;
    }
  });
  d.meta=d.meta||{};
  return d;
}
function loadData(){
  let d=null;
  try{
    const raw=localStorage.getItem(KEY);
    if(raw)d=JSON.parse(raw);
    if(!d){
      const old=localStorage.getItem('hanken_v2')||localStorage.getItem('hanken_v1');
      if(old)d=JSON.parse(old);
    }
  }catch(e){}
  return migrate(d||memStore||{shows:[],people:[],resv:[],meta:{}});
}
function saveData(){
  memStore=DB;
  try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){}
}
let DB=loadData();saveData();
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const yen=n=>'¥'+Number(n||0).toLocaleString();
const esc=s=>(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate=d=>{if(!d)return'';const[y,m,dd]=d.split('-');return `${Number(m)}/${Number(dd)}`;};
const stageName=st=>[fmtDate(st.date),st.label].filter(Boolean).join(' ')||'回名未設定';
const today=()=>new Date().toISOString().slice(0,10);
const isPast=st=>st.date&&st.date<today();

/* ================= 画面遷移 ================= */
let cur='shows', curShow=null, curStage=null, curPerson=null;
function tab(t){
  cur=t; curShow=null; curStage=null; curPerson=null;
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  render();
}
function render(){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  let id='view-'+cur;
  if(cur==='shows'&&curShow)id='view-show-detail';
  if(cur==='people'&&curPerson)id='view-person-detail';
  document.getElementById(id).classList.add('on');
  document.getElementById('fab').style.display=(cur==='shows'||cur==='people')&&!curShow&&!curPerson?'flex':'none';
  const fabLabel=document.getElementById('fabLabel');
  if(fabLabel)fabLabel.textContent=cur==='shows'?'公演を登録':'お客さまを追加';
  if(id==='view-shows')renderShows();
  if(id==='view-show-detail')renderShowDetail();
  if(id==='view-people')renderPeople();
  if(id==='view-person-detail')renderPersonDetail();
  if(id==='view-summary')renderSummary();
  if(id==='view-settings')renderSettings();
  window.scrollTo(0,0);
}
function fabAction(){ cur==='shows'?openShowForm():openPersonForm(); }
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove('on'),1700);
}

/* ================= 並び替え(ヨミガナ・グループ) ================= */
let sortMode=(()=>{try{return localStorage.getItem('hanken_sort')||'kana';}catch(e){return 'kana';}})();
function setSortMode(m){
  sortMode=m;
  try{localStorage.setItem('hanken_sort',m);}catch(e){}
  render();
}
function sortPeople(list){
  const arr=[...list];
  if(sortMode==='group'){
    const ord={A:0,B:1,C:2,'':3};
    arr.sort((a,b)=>(ord[a.group||'']??3)-(ord[b.group||'']??3)||kanaKey(a).localeCompare(kanaKey(b),'ja'));
  }else{
    arr.sort((a,b)=>kanaKey(a).localeCompare(kanaKey(b),'ja'));
  }
  return arr;
}
function kanaKey(p){return p.kana||p.name||'';}
function sortBar(){
  return `<div class="stage-scroller" style="padding-top:0">
    <button class="stage-chip ${sortMode==='kana'?'on':''}" onclick="setSortMode('kana')">あいうえお順</button>
    <button class="stage-chip ${sortMode==='group'?'on':''}" onclick="setSortMode('group')">グループ順</button>
  </div>`;
}

/* ================= 集計ヘルパー ================= */
function stagePriceOf(stageId,show){
  const s=show||DB.shows.find(x=>(x.stages||[]).some(st=>st.id===stageId));
  if(!s)return 0;
  const st=(s.stages||[]).find(x=>x.id===stageId);
  return (st&&Number(st.price)>0)?Number(st.price):Number(s.price)||0;
}
function showStats(s){
  const rs=DB.resv.filter(r=>r.showId===s.id&&isReserved(r));
  const tickets=rs.reduce((a,r)=>a+Number(r.count||0),0);
  const sales=rs.reduce((a,r)=>a+Number(r.count||0)*stagePriceOf(r.stageId,s),0);
  const paidSales=rs.filter(r=>r.paid).reduce((a,r)=>a+Number(r.count||0)*stagePriceOf(r.stageId,s),0);
  const rate=s.quota>0?Math.round(tickets/s.quota*100):null;
  return {tickets,sales,paidSales,rate};
}
function stageDateOf(stageId){
  for(const s of DB.shows){const st=(s.stages||[]).find(x=>x.id===stageId);if(st)return st.date||'';}
  return '';
}
function showStatsInYear(s,year){
  const rs=DB.resv.filter(r=>r.showId===s.id&&isReserved(r)&&stageDateOf(r.stageId).slice(0,4)===String(year));
  const tickets=rs.reduce((a,r)=>a+Number(r.count||0),0);
  const sales=rs.reduce((a,r)=>a+Number(r.count||0)*stagePriceOf(r.stageId,s),0);
  const paidSales=rs.filter(r=>r.paid).reduce((a,r)=>a+Number(r.count||0)*stagePriceOf(r.stageId,s),0);
  return {tickets,sales,paidSales};
}
function availableYears(){
  const ys=new Set();
  DB.shows.forEach(s=>(s.stages||[]).forEach(st=>{if(st.date)ys.add(st.date.slice(0,4));}));
  const arr=[...ys].sort((a,b)=>b.localeCompare(a));
  return arr.length?arr:[String(new Date().getFullYear())];
}

function delShow(id){

  DB.shows=DB.shows.filter(x=>x.id!==id);

function copyInfo(showId){
  const s=DB.shows.find(x=>x.id===showId);
  if(!s||!s.info)return;
  const done=()=>toast('公演情報をコピーしました📋');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(s.info).then(done).catch(()=>fallbackCopy(s.info,done));
  }else{fallbackCopy(s.info,done);}
}
function fallbackCopy(text,done){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');done();}catch(e){toast('コピーできませんでした');}
  document.body.removeChild(ta);
}

function suggestMatches(s){
  const feats=(s.features||'').split(',').map(x=>x.trim()).filter(Boolean);
  if(!feats.length)return [];
  /* 未来のステージがない公演は提案しない */
  if(!(s.stages||[]).some(x=>!isPast(x)))return [];
  const out=[];
  DB.people.forEach(p=>{
    /* この公演のどこかのステージに記録がある人は除外(すでに案内・予約済み) */
    if(DB.resv.some(r=>r.showId===s.id&&r.personId===p.id))return;
    /* NG情報に特徴が一致したら除外 */
    if(p.ng&&feats.some(f=>p.ng.includes(f)))return;
    const text=[p.personal||'',...(p.memos||[]).map(m=>m.text)].join(' ');
    const hit=feats.filter(f=>text.includes(f));
    if(hit.length)out.push({p,hit});
  });
  const ord={A:0,B:1,C:2,'':3};
  out.sort((a,b)=>(ord[a.p.group||'']??3)-(ord[b.p.group||'']??3));
  return out;
}
function nextStageId(s){
  const up=(s.stages||[]).filter(x=>!isPast(x)).sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999'));
  return up[0]?up[0].id:((s.stages||[])[0]?s.stages[0].id:null);
}

function saveStage(showId,stageId){
  const s=DB.shows.find(x=>x.id===showId);
  const date=v('f_sdate');
  const price=Number(v('f_sprice'))||0;
  if(stageId){
    Object.assign(s.stages.find(x=>x.id===stageId),{date,label:v('f_slabel'),price});
  }else{
    const labels=v('f_slabel').split(',').map(x=>x.trim()).filter(Boolean);
    if(!labels.length)labels.push('');
    let lastId=null;
    labels.forEach(label=>{
      const id=uid();
      s.stages.push({id,date,label,price});
      lastId=id;
    });
    curStage=lastId;
  }
  s.stages.sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999'));
  saveData();closeModal();render();toast(stageId?'保存しました':'ステージを追加しました');
}
function delStage(showId,stageId){
  if(!confirm('このステージと、紐づく予約を削除します。よろしいですか？'))return;

  s.stages=s.stages.filter(x=>x.id!==stageId);
  DB.resv=DB.resv.filter(r=>r.stageId!==stageId);
  if(curStage===stageId)curStage=s.stages[0]?s.stages[0].id:null;
  saveData();closeModal();render();toast('削除しました');
}

function checkAfterShow(){
  /* 終演したステージで「予約済み/前日案内済み」の人 → お礼の挨拶前に更新を提案。お礼前の人がいれば知らせる */
  const pending=[];const oreimae=[];
  DB.shows.forEach(s=>(s.stages||[]).forEach(stg=>{
    if(!isPast(stg))return;
    DB.resv.filter(r=>r.stageId===stg.id).forEach(r=>{
      if(r.status==='yoyaku_zumi'||r.status==='zenjitsu_zumi')pending.push({r,s,stg});
      if(r.status==='orei_mae')oreimae.push({r,s,stg});
    });
  }));
  if(!pending.length&&!oreimae.length)return;
  const nm=id=>{const p=DB.people.find(x=>x.id===id);return p?p.name:'?';};
  openModal(`
    <h3>💌 本番、お疲れさまでした！</h3>
    ${pending.length?`<p style="font-size:13.5px;margin-top:8px">終演した回に、ステータスが「予約済み」のままの方が<b>${pending.length}人</b>います。来てくださった方を「お礼の挨拶前」に進めましょう。</p>
    <button class="btn btn-primary" style="margin-top:12px" onclick="bulkOrei()">まとめて「お礼の挨拶前」にする</button>`:''}
    ${oreimae.length?`<p style="font-size:13.5px;margin-top:14px">「お礼の挨拶前」の方が<b>${oreimae.length}人</b>います：</p>
    <div class="card" style="margin-top:8px;max-height:180px;overflow-y:auto">
      ${oreimae.slice(0,20).map(x=>`<div class="kv"><div class="k">${esc(nm(x.r.personId))}</div><div class="v" style="font-size:12.5px;color:var(--sub)">${esc(x.s.name)}・${esc(stageName(x.stg))}</div></div>`).join('')}
      ${oreimae.length>20?`<p class="note">ほか${oreimae.length-20}人</p>`:''}
    </div>
    <p class="note">お礼のメッセージを送ったら、リストのステータスを「お礼送信済み」に更新しましょう。この一手間が、次も来てもらえるいちばんの営業です😊</p>`:''}
    <div class="actions"><button class="btn btn-ghost" onclick="closeModal()">閉じる</button></div>
  `);
}
function bulkOrei(){
  let n=0;
  DB.shows.forEach(s=>(s.stages||[]).forEach(stg=>{
    if(!isPast(stg))return;
    DB.resv.filter(r=>r.stageId===stg.id).forEach(r=>{
      if(r.status==='yoyaku_zumi'||r.status==='zenjitsu_zumi'){r.status='orei_mae';n++;}
    });
  }));
  saveData();closeModal();render();toast(`${n}人を「お礼の挨拶前」にしました`);
  setTimeout(checkAfterShow,400);
}

function timeAgo(dateStr){
  if(!dateStr)return'';
  const d=Math.floor((new Date(today())-new Date(dateStr))/86400000);
  if(d<1)return'今日';
  if(d<31)return d+'日前';
  if(d<366)return Math.floor(d/30)+'ヶ月前';
  return Math.floor(d/365)+'年前';
}
function personStats(pid){
  const rs=DB.resv.filter(r=>r.personId===pid);
  const annai=rs.filter(r=>r.status!=='annai_mae').length; /* 何らかのアクションをした回数 */
  const visits=attendedCount(pid);
  const lastDate=visits.map(r=>{
    const s=DB.shows.find(x=>x.id===r.showId);
    const stg=s?(s.stages||[]).find(x=>x.id===r.stageId):null;
    return stg?stg.date:'';
  }).filter(Boolean).sort().pop()||'';
  return {annai,visits:visits.length,lastDate};
}
function attendedCount(pid){
  return DB.resv.filter(r=>{
    if(r.personId!==pid||!isReserved(r))return false;
    const s=DB.shows.find(x=>x.id===r.showId);
    const stg=s?(s.stages||[]).find(x=>x.id===r.stageId):null;
    return stg&&isPast(stg);
  });
}

function cheerComment(totalQ,totalT){
  if(!totalQ)return 'あなたが出演したことで動いたお金です。この数字は、あなたを観たい人がいる証です🌸';
  const rate=Math.round(totalT/totalQ*100);
  if(rate>=100)return `目標達成、おめでとうございます🎉 あなたが出演したことで、これだけのお金が動きました。堂々と胸を張ってください！`;
  if(rate>=70)return `目標まであと少し（${rate}%）！あなたが出演したことで動いたお金です。ラストスパート、応援しています📣`;
  if(rate>=30)return `折り返し地点（${rate}%）。あなたが出演したことで動いたお金です。案内・リマインドの一声が数字を動かします💪`;
  return `ここからが本番（${rate}%）。あなたが出演したことで動くお金です。まずは「案内を送ろう」の一人目から😊`;
}
function renderSummary(){
  const el=document.getElementById('view-summary');
  const years=availableYears();
  if(!years.includes(sumYear))sumYear=years[0];
  const isYear=sumMode==='year';
  const shownShows=isYear?DB.shows.filter(s=>(s.stages||[]).some(st=>(st.date||'').slice(0,4)===sumYear)):DB.shows;
  const statOf=s=>isYear?showStatsInYear(s,sumYear):showStats(s);
  const totalSales=shownShows.reduce((a,s)=>a+statOf(s).sales,0);
  const totalTickets=shownShows.reduce((a,s)=>a+statOf(s).tickets,0);
  const withQuota=shownShows.filter(s=>s.quota>0);
  const totalQ=withQuota.reduce((a,s)=>a+s.quota,0);
  const totalT=withQuota.reduce((a,s)=>a+statOf(s).tickets,0);
  const peopleInScope=isYear?new Set(DB.resv.filter(r=>isReserved(r)&&stageDateOf(r.stageId).slice(0,4)===sumYear).map(r=>r.personId)).size:DB.people.length;
  el.innerHTML=`
    <div class="stage-scroller" style="padding-top:0">
      <button class="stage-chip ${sumMode==='cumulative'?'on':''}" onclick="sumMode='cumulative';renderSummary()">累計集計</button>
      <button class="stage-chip ${sumMode==='year'?'on':''}" onclick="sumMode='year';renderSummary()">年間集計</button>
      ${isYear?years.map(y=>`<button class="stage-chip ${sumYear===y?'on':''}" onclick="sumYear='${y}';renderSummary()">${y}年</button>`).join(''):''}
    </div>
    <div class="sum-hero"><span class="deco">🎫</span><div class="t">動いたお金（${isYear?sumYear+'年の':'全公演の'}売上見込）</div><div class="n">${yen(totalSales)}</div>
      <p style="font-size:12px;line-height:1.7;margin-top:8px;opacity:.95">${cheerComment(totalQ,totalT)}</p>
      <p style="font-size:10.5px;opacity:.7;margin-top:6px">※チケット売上の見込額であり、あなたの収入（ギャラ）とは異なります。</p>
    </div>
    <div class="sum-row">
      <div class="sum-box"><div class="ic">👥</div><div class="t">${isYear?'来場のあった方':'顧客数'}</div><div class="n">${peopleInScope}<small>人</small></div></div>
      <div class="sum-box"><div class="ic">🎫</div><div class="t">総予約枚数</div><div class="n">${totalTickets}<small>枚</small></div></div>
      <div class="sum-box"><div class="ic">🎭</div><div class="t">公演数</div><div class="n">${shownShows.length}<small>本</small></div></div>
    </div>
    <div class="section-title">🎯 公演別の集客状況</div>
    ${shownShows.length?[...shownShows].sort((a,b)=>firstDate(b).localeCompare(firstDate(a))).map(s=>{
      const st=statOf(s);
      const rate=s.quota>0?Math.round(st.tickets/s.quota*100):null;
      return `<div class="card">
        <b style="font-family:var(--kiwi)">${esc(s.name)}</b>
        <div style="font-size:12px;color:var(--sub)">${firstDate(s)?fmtDate(firstDate(s))+'〜':'日程未定'}　全${(s.stages||[]).length}ステージ</div>
        ${s.quota>0?`<div class="gauge-wrap">
          <div class="gauge-label"><span>集客目標 ${s.quota}枚</span><b>${st.tickets}枚（${rate}%）${rate>=100?'🎉':''}</b></div>
          <div class="gauge"><i class="${rate>=100?'full':''}" style="width:${Math.min(rate,100)}%"></i></div>
        </div>`:`<div class="show-stats"><span>予約 <b>${st.tickets}</b>枚</span></div>`}
        <div class="show-stats"><span>💰 売上見込 <b>${yen(st.sales)}</b></span><span>✅ 入金済 <b>${yen(st.paidSales)}</b></span></div>
      </div>`;
    }).join(''):`<div class="empty">${MASCOT}${isYear?sumYear+'年の公演記録はまだありません。':'公演を登録すると、ここに集客状況が並びます。'}</div>`}`;
}

function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='hanken_backup_'+today()+'.json';
  a.click();
  toast('バックアップを書き出しました💾');
}
function importData(input){
  const f=input.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const d=JSON.parse(rd.result);
      if(!d.shows||!d.people||!d.resv)throw 0;
      if(!confirm('現在のデータを読み込んだ内容で置き換えます。よろしいですか？'))return;
      DB=migrate(d);saveData();render();toast('データを読み込みました');
    }catch(e){toast('ファイルを読み込めませんでした');}
  };
  rd.readAsText(f);
  input.value='';
}
function resetAll(){
  if(!confirm('すべての公演・顧客・予約データを削除します。元に戻せません。よろしいですか？'))return;
  if(!confirm('本当に削除しますか？（バックアップの書き出しをおすすめします）'))return;
  DB={shows:[],people:[],resv:[],meta:{guideSeen:true}};saveData();render();toast('データを削除しました');
}

/* ================= モーダル ================= */
function openModal(html){

  document.getElementById('modalBg').classList.add('on');
}
function closeModal(){document.getElementById('modalBg').classList.remove('on');}
const v=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
